name: Refresh Badges

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch stats and generate SVG badges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .github/badges

          # Fetch repo stats
          REPO=$(gh api repos/dexifyink/MOONLIGHT)
          STARS=$(echo "$REPO" | jq '.stargazers_count')
          LICENSE_NAME=$(echo "$REPO" | jq -r '.license.spdx_id // "N/A"')

          # Fetch releases for download counts
          RELEASES=$(gh api repos/dexifyink/MOONLIGHT/releases --paginate)
          TOTAL_DL=$(echo "$RELEASES" | jq '[.[].assets[].download_count // 0] | add // 0')
          LATEST_DL=$(echo "$RELEASES" | jq '.[0].assets[].download_count // 0' | awk '{s+=$1} END {print s}')
          LATEST_TAG=$(echo "$RELEASES" | jq -r '.[0].tag_name // "none"')

          echo "Stars: $STARS, Total DL: $TOTAL_DL, Latest DL: $LATEST_DL, Tag: $LATEST_TAG"

          # SVG badge generator (for-the-badge style, blue accent)
          make_badge() {
            local label="$1" value="$2" file="$3"
            local label_w=$(( ${#label} * 11 + 20 ))
            local value_w=$(( ${#value} * 14 + 24 ))
            local total_w=$(( label_w + value_w ))
            local half_label=$(( label_w / 2 ))
            local half_value=$(( value_w / 2 ))
            local text_x=$(( label_w + value_w / 2 ))
            printf '<svg xmlns="http://www.w3.org/2000/svg" width="%d" height="28" viewBox="0 0 %d 28"><clipPath id="r"><rect width="%d" height="28" rx="4"/></clipPath><g clip-path="url(#r)"><rect width="%d" height="28" fill="#2a2a3d"/><rect x="%d" width="%d" height="28" fill="#0096ff"/></g><text x="%d" y="18" text-anchor="middle" fill="#fff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">%s</text><text x="%d" y="18" text-anchor="middle" fill="#fff" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700">%s</text></svg>\n' \
              "$total_w" "$total_w" "$total_w" "$label_w" "$label_w" "$value_w" "$half_label" "$label" "$text_x" "$value" \
              > ".github/badges/$file"
          }

          make_badge "DOWNLOADS"  "${TOTAL_DL}"    "downloads.svg"
          make_badge "LATEST"     "${LATEST_TAG}"  "latest.svg"
          make_badge "STARS"      "${STARS}"        "stars.svg"
          make_badge "LICENSE"    "${LICENSE_NAME}" "license.svg"
          make_badge "${TOTAL_DL}"  "" "total-downloads.svg"
          make_badge "${LATEST_DL}" "" "latest-downloads.svg"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .github/badges/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh badges [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "Failed to push after 3 attempts"
          exit 1
